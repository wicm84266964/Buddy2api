<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buddy 2 API</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;--fg:#1a1a1a;--fg2:#666;--fg3:#999;
  --border:#e8e8e8;--border2:#f0f0f0;
  --hover:#f7f7f7;--input:#fafafa;
  --blue:#0066ff;--blue-bg:#f0f5ff;
  --blue-soft:#f7faff;--blue-border:#dbe8ff;
  --green:#00994d;--green-bg:#f0f9f4;
  --red:#e03030;--red-bg:#fef2f2;
  --r:6px;
  --mono:'SF Mono','Fira Code',Consolas,'Courier New',monospace;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--fg);font-size:14px;-webkit-font-smoothing:antialiased}
a{color:var(--blue);text-decoration:none}
code{font-family:var(--mono);font-size:12px}

/* layout */
.layout{display:flex;min-height:100vh}
.side{width:220px;border-right:1px solid var(--border);position:fixed;height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.main{flex:1;margin-left:220px}
.content{padding:24px 32px;max-width:1180px}

/* sidebar */
.side-brand{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.side-brand .mark{font-weight:700;font-size:14px;letter-spacing:-.3px}
.side-brand .ver{font-size:11px;color:var(--fg3);margin-left:auto;font-family:var(--mono)}
.side-nav{flex:1;padding:8px 0;overflow-y:auto}
.side-nav::-webkit-scrollbar{width:0}
.nav-grp{padding:4px 0}
.nav-grp-label{font-size:10px;color:var(--fg3);padding:10px 20px 4px;font-weight:500}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 20px;font-size:13px;color:var(--fg2);cursor:pointer;border-left:2px solid transparent;transition:all .1s}
.nav-item:hover{background:var(--hover);color:var(--fg)}
.nav-item.on{color:var(--fg);font-weight:600;background:var(--hover);border-left-color:var(--fg)}
.nav-item svg{width:15px;height:15px;opacity:.6}
.nav-item.on svg{opacity:1}
.side-foot{padding:12px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--fg3)}
.side-foot a{cursor:pointer}
.side-foot .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:6px}
.side-foot .dot.off{background:var(--fg3)}

/* page head */
.phead{margin-bottom:20px}
.phead h1{font-size:18px;font-weight:700}
.phead p{font-size:12px;color:var(--fg2);margin-top:2px}

/* toolbar */
.tbar{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.spacer{flex:1}

/* buttons */
btn,.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);font:inherit;font-size:13px;color:var(--fg);cursor:pointer;transition:all .1s;white-space:nowrap}
.btn:hover{background:var(--hover);border-color:var(--fg3)}
.btn.s{padding:4px 8px;font-size:12px}
.btn.pri{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border);font-weight:600}
.btn.pri:hover{background:#e7f0ff;border-color:#bcd4ff}
.btn.danger{color:var(--red);border-color:#f0d0d0}
.btn.danger:hover{background:var(--red-bg);border-color:var(--red)}
.btn svg{width:14px;height:14px}

/* card */
.card{border:1px solid var(--border);border-radius:var(--r);margin-bottom:16px}
.card-h{padding:12px 16px;border-bottom:1px solid var(--border2);font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:space-between}
.card-h .sub{font-weight:400;color:var(--fg3);font-size:12px}
.card-p{padding:16px}

/* table */
table{width:100%;border-collapse:collapse;font-size:13px}
.table-scroll{overflow-x:auto}
.table-scroll table{min-width:1260px}
th{text-align:left;padding:8px 16px;font-size:11px;font-weight:600;color:var(--fg3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
td{padding:10px 16px;border-bottom:1px solid var(--border2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--hover)}
.mono{font-family:var(--mono);font-size:12px;color:var(--fg2)}

/* badge */
badge,.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge::before{content:'';width:5px;height:5px;border-radius:50%}
.badge.active{background:var(--green-bg);color:var(--green)}.badge.active::before{background:var(--green)}
.badge.expired{background:var(--red-bg);color:var(--red)}.badge.expired::before{background:var(--red)}
.badge.inactive{background:#f5f5f5;color:var(--fg3)}.badge.inactive::before{background:var(--fg3)}
.badge.ok{background:var(--green-bg);color:var(--green)}.badge.ok::before{background:var(--green)}
.badge.err{background:var(--red-bg);color:var(--red)}.badge.err::before{background:var(--red)}
.badge.warn{background:#fff8e8;color:#9a6a00}.badge.warn::before{background:#d99700}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{border:1px solid var(--border);border-radius:var(--r);padding:16px}
.stat .sl{font-size:11px;color:var(--fg3);text-transform:uppercase;letter-spacing:.3px}
.stat .sv{font-size:22px;font-weight:700;margin-top:6px;letter-spacing:-.5px}
.stat .ss{font-size:11px;color:var(--fg3);margin-top:2px}
.stat .sd{font-size:11px;margin-top:8px;color:var(--fg2);display:flex;align-items:center;gap:6px}
.stat .sd.ok{color:var(--green)}.stat .sd.err{color:var(--red)}

/* dashboard */
.dash-hero{border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px;display:grid;grid-template-columns:1.2fr .8fr;gap:18px;align-items:center}
.health-main{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.health-dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px var(--green-bg)}
.health-dot.warn{background:#d99700;box-shadow:0 0 0 4px #fff8e8}
.health-dot.err{background:var(--red);box-shadow:0 0 0 4px var(--red-bg)}
.health-title{font-size:17px;font-weight:700}
.health-sub{font-size:12px;color:var(--fg3);line-height:1.7}
.health-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.health-kpi{border:1px solid var(--border2);border-radius:4px;padding:9px 10px;background:var(--input)}
.health-kpi .k{font-size:10px;color:var(--fg3);text-transform:uppercase;letter-spacing:.3px}
.health-kpi .v{font-size:16px;font-weight:700;margin-top:3px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.dash-grid.wide{grid-template-columns:1.25fr .75fr}
.dash-grid.thirds{grid-template-columns:repeat(3,1fr)}
.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.metric{border:1px solid var(--border2);border-radius:4px;padding:12px;background:var(--input)}
.metric .m-label{font-size:11px;color:var(--fg3)}
.metric .m-value{font-size:18px;font-weight:700;margin-top:5px}
.metric .m-sub{font-size:11px;color:var(--fg3);margin-top:3px}
.progress{height:5px;border-radius:999px;background:var(--border2);overflow:hidden}
.progress span{display:block;height:100%;background:var(--blue);border-radius:999px}
.progress.ok span{background:var(--green)}.progress.err span{background:var(--red)}
.rank-list{display:flex;flex-direction:column;gap:12px}
.rank-item{display:grid;grid-template-columns:minmax(100px,1fr) 64px;gap:10px;align-items:center}
.rank-name{font-weight:600;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-meta{font-size:11px;color:var(--fg3);margin-top:3px}
.rank-value{text-align:right;font-family:var(--mono);font-size:12px;color:var(--fg2)}
.quick{display:grid;gap:10px}
.quick-row{display:grid;grid-template-columns:88px 1fr auto;gap:8px;align-items:center}
.quick-row .qk{font-size:11px;color:var(--fg3);text-transform:uppercase;letter-spacing:.3px}
.quick-row .qv{font-family:var(--mono);font-size:12px;background:var(--input);border:1px solid var(--border2);border-radius:4px;padding:6px 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.control-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.searchbox,.selectctl{height:30px;padding:5px 9px;border:1px solid var(--border);border-radius:4px;font:inherit;font-size:12px;background:var(--input);outline:none}
.searchbox{min-width:220px}
.searchbox:focus,.selectctl:focus{border-color:var(--blue);background:#fff}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:4px;overflow:hidden;background:var(--bg)}
.seg button{border:none;border-right:1px solid var(--border);background:var(--bg);padding:6px 10px;font:inherit;font-size:12px;cursor:pointer;color:var(--fg2)}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--hover);color:var(--fg);font-weight:600}
.cache-note{font-size:11px;color:var(--fg3);margin-top:3px}
.warn-text{color:#9a6a00}
.mini-table td,.mini-table th{padding:8px 12px}
.status-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.muted{color:var(--fg3)}
.hint{font-size:11px;color:var(--fg3);margin-top:3px}

/* account import */
.detect-summary{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.detect-title{font-weight:700;margin-bottom:4px}
.detect-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.detect-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.detect-box{border:1px solid var(--border2);border-radius:4px;background:var(--input);padding:10px;min-width:0}
.detect-box h4{font-size:11px;color:var(--fg3);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}
.detect-path{display:flex;align-items:center;gap:8px;min-width:0;margin-top:7px}
.detect-path code{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.detect-custom{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center}
.detect-custom input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:4px;font:inherit;font-size:13px;outline:none;background:var(--input)}
.detect-custom input:focus{border-color:var(--blue);background:#fff}
.detect-files{margin-top:12px}
.numctl{width:64px;padding:5px 7px;border:1px solid var(--border);border-radius:4px;font:inherit;font-size:12px;background:var(--input)}
.numctl.credit{width:76px}
.numctl:focus{border-color:var(--blue);background:#fff;outline:none}
.credit-cell{min-width:138px}
.credit-main{display:flex;align-items:center;gap:6px;justify-content:space-between}
.credit-rem{font-weight:700;font-family:var(--mono);font-size:12px}
.credit-rem.unset{font-weight:500;color:var(--fg3)}
.credit-meta{font-size:11px;color:var(--fg3);margin-top:4px}
.credit-cell .progress{margin-top:6px}
.official-cell{min-width:142px}
.official-main{display:flex;align-items:center;gap:6px;justify-content:space-between}
.official-val{font-weight:700;font-family:var(--mono);font-size:12px}
.official-val.unset{font-weight:500;color:var(--fg3)}
.official-meta{font-size:11px;color:var(--fg3);margin-top:4px;white-space:nowrap}
.pkg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.pkg-kpi{border:1px solid var(--border2);border-radius:4px;background:var(--input);padding:10px}
.pkg-kpi .k{font-size:10px;color:var(--fg3);text-transform:uppercase;letter-spacing:.3px}
.pkg-kpi .v{font-size:17px;font-weight:700;margin-top:4px;font-family:var(--mono)}
.pkg-name{font-weight:600;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pkg-time{font-family:var(--mono);font-size:12px;color:var(--fg2);white-space:nowrap}
.pkg-warn{color:#9a6a00}
.ops{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.testbox{border:1px solid var(--border);border-radius:4px;background:var(--input);padding:10px;font-size:12px;line-height:1.6}
.testbox .row{display:flex;justify-content:space-between;gap:12px;margin-bottom:5px}
.testbox .msg{font-family:var(--mono);white-space:pre-wrap;word-break:break-word;margin-top:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 18px}
.form-grid .field{margin-bottom:0}
.info-list{display:grid;gap:10px}
.info-row{display:grid;grid-template-columns:130px 1fr auto;gap:10px;align-items:center}
.info-row .k{font-size:11px;color:var(--fg3);text-transform:uppercase;letter-spacing:.3px}
.info-row .v{font-family:var(--mono);font-size:12px;background:var(--input);border:1px solid var(--border2);border-radius:4px;padding:6px 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.setup-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.setup-tabs button{border:1px solid var(--border);background:var(--bg);border-radius:4px;padding:6px 10px;font:inherit;font-size:12px;cursor:pointer;color:var(--fg2)}
.setup-tabs button.on{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue);font-weight:600}
.setup-panel{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.callout{border:1px solid var(--border2);border-radius:4px;background:var(--input);padding:10px;font-size:12px;line-height:1.65;color:var(--fg2)}
.pager{display:flex;align-items:center;gap:8px;justify-content:flex-end;margin-top:12px}
.detail-row td{background:var(--input)!important}
.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
.detail-k{font-size:10px;color:var(--fg3);text-transform:uppercase;letter-spacing:.3px}
.detail-v{font-family:var(--mono);font-size:12px;margin-top:3px;word-break:break-all}
.errbox{font-family:var(--mono);font-size:12px;white-space:pre-wrap;word-break:break-word;border:1px solid var(--border);border-radius:4px;background:#fff;padding:10px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn:disabled:hover{background:var(--bg);border-color:var(--border)}

/* modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:var(--r);width:460px;max-width:92vw;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;border:1px solid var(--border)}
.modal.wide{width:900px}
.modal-h{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-h h3{font-size:15px;font-weight:700}
.modal-h .x{border:none;background:none;font-size:20px;cursor:pointer;color:var(--fg3);padding:0 4px;line-height:1}
.modal-h .x:hover{color:var(--fg)}
.modal-b{padding:16px;overflow-y:auto;flex:1}
.modal-f{padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* form */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:4px;font:inherit;font-size:13px;outline:none;background:var(--input);transition:border .1s}
.field input:focus,.field textarea:focus{border-color:var(--blue);background:#fff}
.field textarea{font-family:var(--mono);resize:vertical;min-height:120px;font-size:12px;line-height:1.5}
.field .hint{font-size:11px;color:var(--fg3);margin-top:3px}

/* toast */
.toasts{position:fixed;top:16px;right:16px;z-index:2000;display:flex;flex-direction:column;gap:6px}
.toast{padding:8px 14px;border-radius:4px;font-size:13px;color:#fff;animation:tin .2s}
@keyframes tin{from{transform:translateX(120%)}to{transform:translateX(0)}}
.toast.ok{background:var(--green)}.toast.err{background:var(--red)}.toast.info{background:var(--blue)}

/* chart */
.chart-box{padding:16px}
.bars{display:flex;align-items:flex-end;gap:8px;height:120px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bwrap{width:100%;height:90px;display:flex;align-items:flex-end;justify-content:center}
.bar{width:60%;min-height:2px;border-radius:3px 3px 0 0;background:#bcd4ff;transition:height .3s;position:relative;cursor:pointer}
.bar:hover{background:var(--blue)}
.bar:hover .btip{opacity:1}
.btip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#fff;color:var(--fg);border:1px solid var(--border);box-shadow:0 4px 14px rgba(0,0,0,.08);padding:2px 8px;border-radius:3px;font-size:10px;white-space:nowrap;opacity:0;transition:opacity .1s;pointer-events:none}
.blabel{font-size:10px;color:var(--fg3)}

/* misc */
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--fg);border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.load{text-align:center;padding:48px}
.empty{text-align:center;padding:40px;color:var(--fg3)}
.empty .em{font-size:28px;margin-bottom:8px;opacity:.3}
.codeblk{background:var(--blue-soft);color:var(--fg2);border:1px solid var(--blue-border);padding:14px;border-radius:4px;font-family:var(--mono);font-size:12px;line-height:1.7;overflow-x:auto}
.codeblk .k{color:var(--blue);font-weight:600}.codeblk .s{color:#7a5a00}
.keybox{font-family:var(--mono);font-size:12px;background:var(--input);border:1px solid var(--border);padding:8px 12px;border-radius:4px;word-break:break-all;user-select:all}
.tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:11px;background:var(--hover);color:var(--fg2)}
.tag.warn{background:#fff8e8;color:#9a6a00}
@media (max-width:900px){
  .side{position:static;width:100%;height:auto}.layout{display:block}.main{margin-left:0}.content{padding:18px;max-width:none}
  .stats,.dash-grid,.dash-grid.wide,.dash-grid.thirds,.dash-hero,.detect-grid,.detect-custom,.form-grid,.info-row,.setup-panel,.detail-grid{grid-template-columns:1fr}
  .metric-row,.health-kpis{grid-template-columns:1fr}
  .detect-summary{display:block}.detect-actions{justify-content:flex-start;margin-top:10px}
  .control-row{align-items:stretch}.searchbox,.selectctl{width:100%;min-width:0}
}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.min.js"></script>
<script>
const{createApp,ref,reactive,computed,onMounted}=Vue;
const I={
  dash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>',
  users:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  key:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>',

          <div>
            <div class="codeblk" style="margin-bottom:10px">{{envBlock()}}</div>
            <button class="btn s" @click="copy(envBlock(),'preset-env')" style="margin-bottom:10px">{{copied==='preset-env'?'已复制':'复制配置'}}</button>
            <div class="codeblk">{{curlBlock()}}</div>
            <button class="btn s" @click="copy(curlBlock(),'preset-curl')" style="margin-top:10px">{{copied==='preset-curl'?'已复制':'复制 curl'}}</button>
          </div>
        </div>
        <div v-if="setupTab==='codex'" class="callout" style="margin-top:16px;background:var(--blue-soft);border-color:var(--blue-border)">
          <div style="font-weight:600;margin-bottom:8px">Codex 专用处理（自动启用，无需手动配置）</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:12px">
            <div><strong>Responses API 转换</strong><br/><span style="color:var(--fg2)">/v1/responses 请求自动转换为 Chat Completions 转发后端，响应再映射回 Responses SSE 事件格式</span></div>
            <div><strong>模型别名映射</strong><br/><span style="color:var(--fg2)">gpt-5.5 / gpt-5.4 / o3 / o4-mini 等自动映射到 glm-5.2 / deepseek-v4-pro 等后端模型</span></div>
            <div><strong>内容清洗</strong><br/><span style="color:var(--fg2)">Codex system prompt 中的 sandbox / filesystem / execute / elevated 等敏感词自动替换，避免触发腾讯内容审核</span></div>
            <div><strong>工具过滤</strong><br/><span style="color:var(--fg2)">非 function 类型工具（web_search / file_search 等）自动过滤，developer 角色映射为 system</span></div>
          </div>
        </div>
        <div v-if="setupTab==='codex'" style="margin-top:16px;border:1px solid var(--blue-border);border-radius:var(--r);padding:16px;background:var(--blue-soft)">
          <div style="font-weight:600;font-size:14px;margin-bottom:4px">一键配置 Codex</div>
          <div style="font-size:12px;color:var(--fg2);margin-bottom:16px">选择一个 API Key，自动写入 <span class="mono">~/.codex/config.toml</span> 和 <span class="mono">~/.codex/auth.json</span>（原文件备份为 .bak），并设置 <span class="mono">OPENAI_API_KEY</span> 环境变量。配置后需完全关闭 Codex 重新打开。</div>
          
          <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px">
            <div class="field" style="flex:1;min-width:280px;margin:0">
              <label>API Key（sk-cb- 开头）</label>
              <input v-model="codexKeyInput" placeholder="sk-cb-xxxxxxxxxxxxxxxx" style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:var(--mono);background:var(--bg)"/>
              <div class="hint" style="margin-top:4px">在 API Keys 页面创建后复制，粘贴到此处。Key 只在创建时显示一次。</div>
            </div>
            <button class="btn pri" @click="codexSetup" :disabled="codexBusy||!codexKeyInput" style="white-space:nowrap">{{codexBusy?'写入中...':'一键写入配置'}}</button>
          </div>

          <div v-if="codexStatus" style="margin-top:12px">
            <div style="font-size:12px;font-weight:600;margin-bottom:6px">当前 Codex 配置状态</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <span class="badge" :class="codexStatus.config_has_buddy2api?'ok':'inactive'">Provider: {{codexStatus.config_has_buddy2api?'buddy2api':'未配置'}}</span>
              <span class="badge" :class="codexStatus.config_wire_api==='responses'?'ok':'warn'">wire_api: {{codexStatus.config_wire_api||'未设置'}}</span>
              <span class="badge" :class="codexStatus.auth_has_key?'ok':'inactive'">auth.json: {{codexStatus.auth_has_key?'已配置':'未配置'}}</span>
              <span class="badge" :class="codexStatus.config_model?'ok':'inactive'">model: {{codexStatus.config_model||'未设置'}}</span>
            </div>
          </div>

          <div v-if="codexResult" style="margin-top:12px;padding:12px;border-radius:var(--r);background:var(--bg);border:1px solid var(--border)">
            <div v-if="codexResult.status==='ok'" style="color:var(--green)">
              <strong>配置成功</strong>
              <div style="margin-top:6px;font-size:12px;color:var(--fg2)">已写入文件：<span class="mono" v-for="f in codexResult.written" :key="f">{{f}} </span></div>
              <div v-if="codexResult.backed_up && codexResult.backed_up.length" style="margin-top:4px;font-size:12px;color:var(--fg3)">已备份：<span class="mono" v-for="f in codexResult.backed_up" :key="f">{{f}} </span></div>
              <div style="margin-top:8px;font-size:12px;color:var(--blue)">请完全关闭 Codex 后重新打开。</div>
            </div>
            <div v-else style="color:var(--red)">
              <strong>配置失败</strong>
              <div style="margin-top:4px;font-size:12px">{{codexResult.message||'未知错误'}}</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card card-p"><div style="font-weight:600;font-size:13px;margin-bottom:10px">快速验证</div>
      <div class="codeblk"><span class="k">curl</span> {{s.base_url}}/chat/completions \\
  -H <span class="s">"Authorization: Bearer YOUR_KEY"</span> \\
  -H <span class="s">"Content-Type: application/json"</span> \\
  -d <span class="s">'{"model":"auto","messages":[{"role":"user","content":"hi"}]}'</span></div>
    </div>
  </template>
</div>`
}).mount('#app');
</script>
</body>
</html>

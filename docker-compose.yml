services:
  buddy2api:
    build: .
    container_name: buddy2api
    ports:
      - "8787:8787"
    volumes:
      # 持久化数据库
      - ./data:/app/data
      # Windows 推荐直接运行 .\start-docker-win.ps1 自动挂载登录目录
      # WSL 推荐运行 ./start-docker-wsl.sh 自动挂载 /mnt/c 下的登录目录
    environment:
      - CB_GATEWAY_ADMIN_TOKEN=${CB_GATEWAY_ADMIN_TOKEN:-change-this-token}
      - CB_GATEWAY_DB_PATH=/app/data/buddy2api.db
      - CB_AUTH_DIR=/auth
      - CB_CONTAINER_AUTH_DIR=/auth
      - CB_DOCKER=1
    restart: unless-stopped
